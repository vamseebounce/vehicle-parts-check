<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vehicle Parts Check — RRR Fleet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh}
.hd{background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:36px 20px 44px;text-align:center}
.hd h1{color:#fff;font-size:1.5rem;font-weight:800;margin-bottom:4px}
.hd p{color:rgba(255,255,255,.5);font-size:.82rem;margin-bottom:22px}
.sw{max-width:480px;margin:0 auto;position:relative}
.sw input{width:100%;padding:16px 50px 16px 20px;border:none;border-radius:14px;font-size:1rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.18);outline:none}
.sw input::placeholder{text-transform:none;letter-spacing:0;font-weight:400;color:#bbb}
.sw svg{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px 60px}
.hint{text-align:center;color:#94a3b8;font-size:.82rem;margin-top:14px;line-height:2.2}
.hint span{background:#e2e8f0;color:#64748b;border-radius:6px;padding:2px 9px;font-size:.78rem;margin:2px;font-family:monospace;cursor:pointer}
.dots{text-align:center;padding:40px}
.dot{display:inline-block;width:8px;height:8px;background:#3b82f6;border-radius:50%;margin:0 3px;animation:bop 1s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,100%{transform:translateY(0)}45%{transform:translateY(-9px)}}
.nf{text-align:center;padding:50px 20px}
.nf .ic{font-size:2.8rem;margin-bottom:10px}
.nf h3{color:#374151;margin-bottom:5px}
.nf p{color:#9ca3af;font-size:.875rem}
.card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,.07);margin-top:16px}
.ch{padding:18px 20px 14px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid #f1f5f9}
.reg{font-size:1.28rem;font-weight:800;color:#1e293b;letter-spacing:1px}
.bid{font-size:.74rem;color:#94a3b8;margin-top:2px}
.ub{border-radius:10px;padding:5px 12px;font-size:.74rem;font-weight:700;white-space:nowrap}
.u1{background:#fee2e2;color:#dc2626}
.u2{background:#fef3c7;color:#d97706}
.u3{background:#dcfce7;color:#16a34a}
.u0{background:#f1f5f9;color:#64748b}
.cb{padding:14px 20px 18px}
.st{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-bottom:8px;margin-top:2px}
/* 3-column grid for parts — collapses to 1 col on very small screens */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
@media(max-width:420px){.pg{grid-template-columns:1fr}}
.pc{border-radius:12px;padding:11px 13px;border:1.5px solid #e2e8f0;background:#f8fafc}
.pc.ov{background:#fff5f5;border-color:#fecaca}
.pc.ok{background:#f0fdf4;border-color:#bbf7d0}
.pn{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:3px}
.ps{font-size:.88rem;font-weight:700}
.ps.sov{color:#dc2626}.ps.sok{color:#16a34a}.ps.snd{color:#94a3b8}
.pd{font-size:.75rem;color:#64748b;margin-top:2px}
.pd b{color:#374151;font-weight:600}
.or{display:flex;gap:8px}
.oi{flex:1;background:#f8fafc;border-radius:12px;padding:10px 12px;border:1px solid #e2e8f0;text-align:center}
.ol{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:2px}
.ov3{font-size:.95rem;font-weight:700;color:#1e293b}
.os{font-size:.7rem;color:#94a3b8}
.chk{display:inline-flex;align-items:center;gap:5px;border-radius:8px;padding:6px 12px;font-size:.78rem;font-weight:600;margin-top:12px}
.chk.warn{background:#fff7ed;color:#ea580c}
.chk.clr{background:#f0fdf4;color:#16a34a}
footer{text-align:center;color:#94a3b8;font-size:.74rem;padding:0 0 24px}
</style>
</head>
<body>
<div class="hd">
  <h1>Vehicle Parts Check</h1>
  <p>Live data - Updated hourly - Search by reg number</p>
  <div style="display:flex;gap:10px;justify-content:center;margin-bottom:14px">
    <a href="/index.html" style="color:rgba(255,255,255,.9);font-size:.78rem;text-decoration:none;padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15)">Parts Check</a>
    <a href="/queue.html" style="color:rgba(255,255,255,.55);font-size:.78rem;text-decoration:none;padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.2)">Work Queue</a>
  </div>
  <div class="sw">
    <input id="si" type="text" placeholder="e.g. KA05AQ6570" autocomplete="off" spellcheck="false"/>
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </div>
</div>
<div class="wrap">
  <div id="res">
    <div class="hint">Try:
      <span class="ex" data-reg="KA05AQ6570">KA05AQ6570</span>
      <span class="ex" data-reg="NCRBD00238">NCRBD00238</span>
      <span class="ex" data-reg="DL9EV7460">DL9EV7460</span>
    </div>
  </div>
</div>
<footer>Fleet data synced every hour from Metabase</footer>
<script>
var SB='https://clkfvmmlgwcvntxnolsv.supabase.co';
var K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsa2Z2bW1sZ3djdm50eG5vbHN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDQ2NTgsImV4cCI6MjA5MDEyMDY1OH0.FA33GFQisWX_hDeGCWqL5yAZmPcuQRdxZX32I23lyoY';
var si=document.getElementById('si');
var rv=document.getElementById('res');
var t;

document.body.addEventListener('click',function(e){
  var el=e.target.closest('.ex');
  if(el){ go(el.dataset.reg); }
});

si.addEventListener('input',function(){
  clearTimeout(t);
  var v=si.value.trim().toUpperCase();
  if(v.length<2){
    rv.innerHTML='<div class="hint">Try: <span class="ex" data-reg="KA05AQ6570">KA05AQ6570</span> <span class="ex" data-reg="NCRBD00238">NCRBD00238</span> <span class="ex" data-reg="DL9EV7460">DL9EV7460</span></div>';
    return;
  }
  rv.innerHTML='<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  t=setTimeout(function(){ run(v); },300);
});

function go(v){ si.value=v; si.dispatchEvent(new Event('input')); }

function run(q){
  fetch(SB+'/rest/v1/vehicle_parts_check_flag?reg_number=ilike.'+encodeURIComponent('%'+q+'%')+'&limit=10&select=*&order=overall_urgency.asc',
    {headers:{apikey:K,Authorization:'Bearer '+K}})
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(!d||!d.length){
      rv.innerHTML='<div class="nf"><div class="ic">&#128269;</div><h3>Not found</h3><p>No vehicle matching <b>'+q+'</b></p></div>';
    } else {
      rv.innerHTML=d.map(card).join('');
    }
  })
  .catch(function(e){ rv.innerHTML='<div class="nf"><h3>Error</h3><p>'+e.message+'</p></div>'; });
}

function fm(v){ return v!=null?Number(v).toLocaleString('en-IN'):'--'; }
function fd(d){ return d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'--'; }
function sc(s){ return !s||s==='No Data'?'snd':s==='Overdue'?'sov':s==='N/A'?'snd':'sok'; }
function pcc(s){ return !s||s==='No Data'||s==='N/A'?'':s==='Overdue'?'ov':'ok'; }
function neg(n){ return n!=null&&n<0?'#dc2626':'#16a34a'; }

function partCard(label, status, kmSince, kmRem, lastDate, lastHub){
  var s = status || 'No Data';
  if(s === 'N/A'){
    return '<div class="pc" style="opacity:.45">'
      +'<div class="pn">'+label+'</div>'
      +'<div class="ps snd">N/A</div>'
      +'<div class="pd" style="font-size:.7rem;color:#94a3b8">Not applicable for this model</div>'
      +'</div>';
  }
  return '<div class="pc '+pcc(status)+'">'
    +'<div class="pn">'+label+'</div>'
    +'<div class="ps '+sc(status)+'">'+s+'</div>'
    +'<div class="pd">Since: <b>'+fm(kmSince)+' km</b></div>'
    +'<div class="pd">Rem: <b style="color:'+neg(kmRem)+'">'+fm(kmRem)+' km</b></div>'
    +'<div class="pd">Last Svc: <b>'+fd(lastDate)+'</b></div>'
    +(lastHub?'<div class="pd">Hub: <b>'+lastHub+'</b></div>':'')
    +'</div>';
}

function card(v){
  var ul=v.overall_urgency===1?'Critical':v.overall_urgency===2?'Moderate':v.overall_urgency===3?'Good':'OK';

  // Support both old (brake_*) and new (front_brake_* / rear_brake_*) column schemas
  var hasSplit = v.front_brake_status !== undefined || v.rear_brake_status !== undefined;

  var partsHtml;
  if(hasSplit){
    // Disc bikes (dms_bike_model_id 1,2,3) use Pad; Drum bikes (4-7) use Shoe
    var isDisc = [1,2,3].indexOf(Number(v.dms_bike_model_id)) !== -1;
    var frBrakeLabel = isDisc ? 'Fr Brake Pad' : 'Fr Brake Shoe';
    var rrBrakeLabel = isDisc ? 'Rr Brake Pad' : 'Rr Brake Shoe';
    partsHtml=partCard(frBrakeLabel,        v.front_brake_status,       v.front_brake_km_since,       v.front_brake_km_remaining,       v.last_front_brake_replaced_date,       v.last_front_brake_replaced_hub)
      +partCard(rrBrakeLabel,               v.rear_brake_status,        v.rear_brake_km_since,        v.rear_brake_km_remaining,        v.last_rear_brake_replaced_date,        v.last_rear_brake_replaced_hub)
      +partCard('Tyre',                     v.tyre_status,              v.tyre_km_since,              v.tyre_km_remaining,              v.last_tyre_replaced_date,              v.last_tyre_replaced_hub)
      +partCard('Fr Brake Cable',           v.fr_brake_cable_status,    v.fr_brake_cable_km_since,    v.fr_brake_cable_km_remaining,    v.last_fr_brake_cable_replaced_date,    v.last_fr_brake_cable_replaced_hub)
      +partCard('Rr Brake Cable',           v.rr_brake_cable_status,    v.rr_brake_cable_km_since,    v.rr_brake_cable_km_remaining,    v.last_rr_brake_cable_replaced_date,    v.last_rr_brake_cable_replaced_hub)
      +partCard('Brake Shoe Spring',        v.brake_shoe_spring_status, v.brake_shoe_spring_km_since, v.brake_shoe_spring_km_remaining, v.last_brake_shoe_spring_replaced_date, v.last_brake_shoe_spring_replaced_hub)
      +partCard('Cone Set',                 v.cone_set_status,          v.cone_set_km_since,          v.cone_set_km_remaining,          v.last_cone_set_replaced_date,          v.last_cone_set_replaced_hub)
      +partCard('Fr Brake Disc',            v.fr_brake_disc_status,     v.fr_brake_disc_km_since,     v.fr_brake_disc_km_remaining,     v.last_fr_brake_disc_replaced_date,     v.last_fr_brake_disc_replaced_hub)
      +partCard('Rr Brake Disc',            v.rr_brake_disc_status,     v.rr_brake_disc_km_since,     v.rr_brake_disc_km_remaining,     v.last_rr_brake_disc_replaced_date,     v.last_rr_brake_disc_replaced_hub)
      +partCard('Brake Oil',                v.brake_oil_status,         v.brake_oil_km_since,         v.brake_oil_km_remaining,         v.last_brake_oil_replaced_date,         v.last_brake_oil_replaced_hub)
      +partCard('Fr Wheel Bearing',         v.fr_wheel_bearing_status,  v.fr_wheel_bearing_km_since,  v.fr_wheel_bearing_km_remaining,  v.last_fr_wheel_bearing_replaced_date,  v.last_fr_wheel_bearing_replaced_hub)
      +partCard('Rr Wheel Bearing',         v.rr_wheel_bearing_status,  v.rr_wheel_bearing_km_since,  v.rr_wheel_bearing_km_remaining,  v.last_rr_wheel_bearing_replaced_date,  v.last_rr_wheel_bearing_replaced_hub)
      +partCard('Side Stand Spr',           v.side_stand_spring_status, v.side_stand_spring_km_since, v.side_stand_spring_km_remaining, v.last_side_stand_spring_replaced_date, v.last_side_stand_spring_replaced_hub)
      +partCard('Main Stand Spr',           v.main_stand_spring_status, v.main_stand_spring_km_since, v.main_stand_spring_km_remaining, v.last_main_stand_spring_replaced_date, v.last_main_stand_spring_replaced_hub);
  } else {
    // Fallback: old combined brake column — 2-col layout
    partsHtml=partCard('Brake', v.brake_status, v.brake_km_since, v.brake_km_remaining, v.last_brake_replaced_date, v.last_brake_replaced_hub)
      +partCard('Tyre', v.tyre_status, v.tyre_km_since, v.tyre_km_remaining, v.last_tyre_replaced_date, v.last_tyre_replaced_hub);
  }

  // Vehicle status badge colour
  return '<div class="card">'
    +'<div class="ch"><div><div class="reg">'+v.reg_number+'</div><div class="bid">Bike #'+v.bike_id+'</div></div>'
    +'<div class="ub u'+(v.overall_urgency||0)+'">'+ul+'</div></div>'
    // Vehicle info row
    +(v.deployed_hub||v.last_service_hub?
      '<div style="display:flex;gap:16px;flex-wrap:wrap;padding:10px 14px 4px;font-size:.78rem;color:#64748b;border-bottom:1px solid #f1f5f9">'
      +(v.deployed_hub?'<span>Deployed: <b style="color:#1e293b">'+v.deployed_hub+'</b></span>':'')
      +(v.last_service_hub?'<span>Last Service: <b style="color:#1e293b">'+v.last_service_hub+'</b></span>':'')
      +'</div>'
    :'')
    +'<div class="cb">'
    +'<div class="st">Parts Status</div>'
    +'<div class="pg">'+partsHtml+'</div>'
    +'<div class="st">Odometer</div>'
    +'<div class="or">'
    +'<div class="oi"><div class="ol">Est. Current</div><div class="ov3">'+fm(v.estimated_current_odo)+'</div><div class="os">km</div></div>'
    +'<div class="oi"><div class="ol">Last JC Odo</div><div class="ov3">'+fm(v.last_jc_odo)+'</div><div class="os">km</div></div>'
    +'<div class="oi"><div class="ol">Days Since JC</div><div class="ov3">'+(v.days_since_last_jc!=null?v.days_since_last_jc:'--')+'</div><div class="os">days</div></div>'
    +'</div>'
    +(v.check_required?'<div class="chk warn">&#9888; Check Required</div>':'<div class="chk clr">&#10003; No Check Required</div>')
    // PMS / HST activity flags based on days since last JC
    +(v.days_since_last_jc!=null && v.days_since_last_jc > 30
      ? '<div class="chk" style="background:#fee2e2;color:#dc2626;border-color:#fca5a5">&#9888; PMS Required — '+v.days_since_last_jc+' days since last JC (threshold: 30 days)</div>'
      : v.days_since_last_jc!=null && v.days_since_last_jc > 15
        ? '<div class="chk" style="background:#fef3c7;color:#d97706;border-color:#fcd34d">&#9888; HST Activity Required — '+v.days_since_last_jc+' days since last JC (threshold: 15 days)</div>'
        : '')
    +'</div></div>';
}
</script>
</body>
</html>
