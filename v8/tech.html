<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FleetPro RSA">
<link rel="manifest" href="tech-manifest.json">
<title>FleetPro RSA Tech</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#0f172a;color:#f1f5f9;overscroll-behavior:none}
:root{--teal:#14b8a6;--amber:#f59e0b;--green:#22c55e;--red:#ef4444;--card:#1e293b;--border:#334155;--muted:#94a3b8}

/* ===== LAYOUT ===== */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{background:#1e293b;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#header-logo{width:32px;height:32px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#0f172a}
#header-info{flex:1;min-width:0}
#header-name{font-size:15px;font-weight:700;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#header-status{font-size:11px;color:var(--teal);font-weight:600}
#logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:6px;font-size:13px}
#logout-btn:active{background:var(--border)}

#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#tabbar{background:#1e293b;border-top:1px solid var(--border);display:flex;flex-shrink:0}
.tab{flex:1;padding:10px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.3px;transition:color .15s}
.tab svg{width:20px;height:20px}
.tab.active{color:var(--teal)}
.tab-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center;line-height:14px}

/* ===== LOGIN ===== */
#login-screen{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:#0f172a}
.login-logo{width:64px;height:64px;background:var(--teal);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#0f172a;margin-bottom:24px}
.login-title{font-size:22px;font-weight:800;color:#f1f5f9;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px}
.login-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px}
.input-group{display:flex;flex-direction:column;gap:6px}
.input-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.input-field{background:#1e293b;border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;font-size:15px;color:#f1f5f9;outline:none;width:100%;transition:border-color .15s}
.input-field:focus{border-color:var(--teal)}
.btn-primary{background:var(--teal);color:#0f172a;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s;margin-top:4px}
.btn-primary:active{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
#login-error{color:var(--red);font-size:13px;text-align:center;min-height:18px}

/* ===== CARDS ===== */
.section-header{padding:16px 16px 8px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.ticket-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin:0 12px 10px;padding:14px;cursor:pointer;transition:border-color .15s,transform .1s;position:relative;overflow:hidden}
.ticket-card:active{transform:scale(.99)}
.ticket-card.urgent{border-color:var(--red)}
.ticket-card.urgent::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red);border-radius:14px 0 0 14px}
.ticket-card.inprog{border-color:var(--amber)}
.ticket-card.inprog::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--amber)}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.tc-number{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.badge-new{background:rgba(239,68,68,.15);color:var(--red)}
.badge-prog{background:rgba(245,158,11,.15);color:var(--amber)}
.badge-done{background:rgba(34,197,94,.15);color:var(--green)}
.tc-reg{font-size:17px;font-weight:800;color:#f1f5f9;margin-bottom:3px}
.tc-cat{font-size:13px;color:var(--muted);margin-bottom:10px}
.tc-meta{display:flex;gap:12px;align-items:center}
.tc-time{font-size:12px;color:var(--amber);font-weight:600}
.tc-city{font-size:11px;background:rgba(20,184,166,.12);color:var(--teal);padding:2px 7px;border-radius:6px;font-weight:700}
.tc-action-row{display:flex;gap:8px;margin-top:12px}

/* ===== BUTTONS ===== */
.btn{border:none;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;justify-content:center;transition:opacity .15s}
.btn:active{opacity:.8}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-teal{background:var(--teal);color:#0f172a}
.btn-amber{background:var(--amber);color:#0f172a}
.btn-green{background:var(--green);color:#0f172a}
.btn-ghost{background:rgba(148,163,184,.1);color:#f1f5f9}
.btn-red{background:rgba(239,68,68,.15);color:var(--red)}
.btn-full{width:100%}

/* ===== EMPTY / LOADING ===== */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;gap:12px;color:var(--muted)}
.empty-icon{font-size:48px;opacity:.5}
.empty-text{font-size:14px;font-weight:600;text-align:center}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{display:flex;justify-content:center;padding:48px}
.stats-bar{display:flex;gap:0;background:var(--card);border-bottom:1px solid var(--border)}
.stat-item{flex:1;padding:14px 12px;text-align:center;border-right:1px solid var(--border)}
.stat-item:last-child{border-right:none}
.stat-num{font-size:22px;font-weight:800}
.stat-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px;margin-top:2px}

/* ===== MODAL / DETAIL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;flex-direction:column;justify-content:flex-end}
.modal-sheet{background:#0f172a;border-radius:20px 20px 0 0;max-height:93vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.modal-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-title{font-size:18px;font-weight:800;color:#f1f5f9}
.modal-close{background:var(--border);border:none;color:var(--muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-body{padding:16px}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.3px}
.detail-value{font-size:14px;font-weight:600;color:#f1f5f9;text-align:right;max-width:60%}
.section-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin:16px 0 10px}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.action-grid .btn{flex-direction:column;gap:4px;padding:14px 10px;font-size:12px}
.action-grid .btn .btn-icon{font-size:22px}
.maps-btn{display:flex;align-items:center;gap:10px;background:#1e293b;border:1.5px solid var(--teal);border-radius:12px;padding:14px 16px;color:var(--teal);font-weight:700;font-size:14px;cursor:pointer;width:100%;margin-bottom:16px;text-decoration:none;justify-content:center}
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:12px;padding:10px 0}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--teal);margin-top:4px;flex-shrink:0}
.tl-dot.done{background:var(--green)}
.tl-line{width:1px;background:var(--border);margin-left:4px;flex-shrink:0}
.tl-content{flex:1;padding-bottom:4px}
.tl-action{font-size:13px;font-weight:700;color:#f1f5f9}
.tl-time{font-size:11px;color:var(--muted);margin-top:2px}
.tl-note{font-size:12px;color:var(--muted);margin-top:3px;font-style:italic}

/* ===== COMPLETE FORM ===== */
.form-field{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-bottom:7px;display:block}
.form-select,.form-textarea{background:#1e293b;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;color:#f1f5f9;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none}
.form-select:focus,.form-textarea:focus{border-color:var(--teal)}
.form-textarea{min-height:90px;resize:vertical;font-family:inherit}
.evidence-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.evidence-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;background:var(--border)}
.evidence-thumb.video-thumb{display:flex;align-items:center;justify-content:center;background:#1e293b;border:1px solid var(--border);border-radius:8px;font-size:28px;cursor:pointer}
.add-evidence-btn{width:100%;aspect-ratio:1;background:#1e293b;border:1.5px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;color:var(--muted);transition:border-color .15s}
.add-evidence-btn:active{border-color:var(--teal)}
#evidence-input{display:none}
.upload-progress{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.upload-bar{height:100%;background:var(--teal);border-radius:2px;transition:width .3s}

/* ===== HISTORY ===== */
.history-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin:0 12px 10px;padding:14px}
.hc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.hc-ticket{font-size:13px;font-weight:700;color:var(--teal)}
.hc-date{font-size:11px;color:var(--muted)}
.hc-reg{font-size:15px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.hc-res{font-size:12px;color:var(--green);font-weight:600}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#f1f5f9;padding:11px 20px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:200;white-space:nowrap;border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--red);color:var(--red)}

/* ===== MISC ===== */
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;background:rgba(148,163,184,.1);color:var(--muted)}
.divider{height:1px;background:var(--border);margin:8px 0}
.refresh-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:6px;font-size:18px}
.refresh-btn:active{background:var(--border)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">F</div>
  <div class="login-title">FleetPro RSA</div>
  <div class="login-sub">Technician Portal</div>
  <button id="install-btn" onclick="installApp()" style="display:none;background:rgba(20,184,166,.15);border:1.5px solid var(--teal);color:var(--teal);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:20px;width:100%;max-width:360px">⬇ Install App</button>
  <div class="login-form">
    <div class="input-group">
      <label class="input-label">Email</label>
      <input class="input-field" type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="input-group">
      <label class="input-label">Password</label>
      <input class="input-field" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="login-error"></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div id="header">
    <div class="login-logo" style="width:36px;height:36px;font-size:14px;border-radius:10px">F</div>
    <div id="header-info">
      <div id="header-name">Loading...</div>
      <div id="header-status">● RSA Technician</div>
    </div>
    <button class="refresh-btn" onclick="loadTickets()" title="Refresh">↻</button>
    <button class="logout-btn" id="logout-btn" onclick="doLogout()">Sign out</button>
  </div>

  <div id="content">
    <!-- MY JOBS TAB -->
    <div id="tab-jobs">
      <div class="stats-bar">
        <div class="stat-item"><div class="stat-num" id="stat-active" style="color:var(--amber)">0</div><div class="stat-label">ACTIVE</div></div>
        <div class="stat-item"><div class="stat-num" id="stat-today" style="color:var(--green)">0</div><div class="stat-label">TODAY</div></div>
        <div class="stat-item"><div class="stat-num" id="stat-total" style="color:var(--teal)">0</div><div class="stat-label">ALL TIME</div></div>
      </div>
      <div class="section-header">ACTIVE TICKETS</div>
      <div id="tickets-list"><div class="loading-wrap"><div class="spinner"></div></div></div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" style="display:none">
      <div class="section-header" style="display:flex;align-items:center;justify-content:space-between;padding-right:16px">
        <span>COMPLETED JOBS</span>
      </div>
      <div id="history-list"><div class="loading-wrap"><div class="spinner"></div></div></div>
    </div>
  </div>

  <div id="tabbar">
    <button class="tab active" id="tab-btn-jobs" onclick="switchTab('jobs')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 13h4"/></svg>
      MY JOBS
    </button>
    <button class="tab" id="tab-btn-history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      HISTORY
    </button>
  </div>
</div>

<!-- TICKET DETAIL MODAL -->
<div id="detail-modal" class="modal-overlay" style="display:none" onclick="closeDetailIfBg(event)">
  <div class="modal-sheet" id="detail-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div id="dm-number" style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.5px;margin-bottom:4px"></div>
        <div id="dm-title" class="modal-title"></div>
      </div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body">
      <div id="dm-badge-row" class="pill-row"></div>
      <div id="dm-details"></div>
      <a id="dm-maps-btn" class="maps-btn" target="_blank" rel="noopener">
        <span style="font-size:20px">📍</span> Open in Google Maps
      </a>
      <div class="section-title">ACTIONS</div>
      <div id="dm-actions"></div>
      <div class="section-title">TIMELINE</div>
      <div id="dm-timeline"></div>
    </div>
  </div>
</div>

<!-- COMPLETE FORM MODAL -->
<div id="complete-modal" class="modal-overlay" style="display:none">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Mark Complete</div>
      <button class="modal-close" onclick="closeComplete()">✕</button>
    </div>
    <div class="modal-body">
      <div id="complete-ticket-info" style="font-size:13px;color:var(--muted);margin-bottom:16px"></div>
      <div class="form-field">
        <label class="form-label">Resolution Type *</label>
        <select class="form-select" id="complete-resolution">
          <option value="">Select resolution...</option>
          <option value="phone_resolved">📞 Resolved over phone</option>
          <option value="repaired_on_site">🔧 Repaired on site</option>
          <option value="porter_needed">🚛 Porter needed — not rideable</option>
          <option value="towed_to_hub">🏠 Towed to hub</option>
          <option value="battery_swap">🔋 Battery swap done</option>
          <option value="other">💬 Other (explain in notes)</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="complete-notes" placeholder="What was the issue? What did you do?"></textarea>
      </div>
      <div class="form-field">
        <label class="form-label">Evidence (photos / videos)</label>
        <div class="evidence-grid" id="evidence-grid"></div>
        <button class="add-evidence-btn" onclick="document.getElementById('evidence-input').click()">＋</button>
        <input type="file" id="evidence-input" accept="image/*,video/*" multiple capture="environment" onchange="handleEvidenceFiles(this.files)">
        <div class="upload-progress" id="upload-progress" style="display:none"><div class="upload-bar" id="upload-bar" style="width:0%"></div></div>
      </div>
      <button class="btn btn-green btn-full" id="submit-complete-btn" onclick="submitComplete()" style="padding:14px;font-size:14px;margin-top:8px">
        ✓ Mark as Complete
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const SB_URL='https://clkfvmmlgwcvntxnolsv.supabase.co';
const ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsa2Z2bW1sZ3djdm50eG5vbHN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDQ2NTgsImV4cCI6MjA5MDEyMDY1OH0.FA33GFQisWX_hDeGCWqL5yAZmPcuQRdxZX32I23lyoY';

const sb = supabase.createClient(SB_URL, ANON_KEY);
let _tech = null; // { id, name, email }
let _tickets = [];
let _actions = {}; // ticket_number -> [actions]
let _currentTicket = null;
let _pendingEvidence = []; // { file, url (local preview), uploaded_url }
let _activeTab = 'jobs';

// ===== AUTH =====
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await onLogin(session.user);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  err.textContent = '';
  if (!email || !pw) { err.textContent = 'Enter email and password'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) { err.textContent = error.message; btn.disabled = false; btn.textContent = 'Sign In'; return; }
  await onLogin(data.user);
}

async function onLogin(user) {
  // Fetch tech profile
  const { data: profile } = await sb.from('rsa_technicians').select('*').eq('id', user.id).single();
  if (!profile) {
    await sb.auth.signOut();
    document.getElementById('login-error').textContent = 'Account not found. Contact admin.';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Sign In';
    return;
  }
  _tech = profile;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('header-name').textContent = profile.name;
  await loadTickets();
  await loadHistory();
  startAutoRefresh();
}

async function doLogout() {
  await sb.auth.signOut();
  _tech = null; _tickets = []; _actions = {};
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
}

// ===== DATA =====
async function loadTickets() {
  const { data, error } = await sb
    .from('rsa_tickets_live')
    .select('ticket_number,status,category,reg_number,fault_details,city,created_at_ist,inprogress_at_ist,display_lat,display_lng,technician_name')
    .eq('technician_name', _tech.name)
    .in('status', ['NEW','IN_PROGRESS'])
    .order('created_at_ist', { ascending: true });

  if (!error) {
    _tickets = data || [];
    await loadActions(_tickets.map(t => t.ticket_number));
    renderTickets();
    updateStats();
  }
}

async function loadActions(ticketNums) {
  if (!ticketNums.length) return;
  const { data } = await sb
    .from('rsa_tech_actions')
    .select('*')
    .in('ticket_number', ticketNums)
    .order('created_at', { ascending: true });
  _actions = {};
  (data || []).forEach(a => {
    if (!_actions[a.ticket_number]) _actions[a.ticket_number] = [];
    _actions[a.ticket_number].push(a);
  });
}

async function loadHistory() {
  const { data } = await sb
    .from('rsa_tech_actions')
    .select('*')
    .eq('technician_id', _tech.id)
    .eq('action', 'completed')
    .order('created_at', { ascending: false })
    .limit(50);
  renderHistory(data || []);
  document.getElementById('stat-total').textContent = (data || []).length;
}

async function updateStats() {
  const active = _tickets.length;
  document.getElementById('stat-active').textContent = active;
  // Today's completions
  const today = new Date().toISOString().split('T')[0];
  const { count } = await sb
    .from('rsa_tech_actions')
    .select('*', { count: 'exact', head: true })
    .eq('technician_id', _tech.id)
    .eq('action', 'completed')
    .gte('created_at', today + 'T00:00:00Z');
  document.getElementById('stat-today').textContent = count || 0;
}

function startAutoRefresh() {
  setInterval(() => { loadTickets(); }, 60000); // refresh every 60s
}

// ===== RENDER =====
function parseUtcTs(ts) {
  if (!ts) return null;
  var s = ts.toString().trim().replace(' ','T').replace(/(Z|[+-]\d{2}(?::?\d{2})?)$/,'');
  var d = new Date(s + 'Z');
  return isNaN(d.getTime()) ? null : d;
}
function fmtTime(ts) {
  var d = parseUtcTs(ts);
  return d ? d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'}) : '--';
}
function fmtDateTime(ts) {
  var d = parseUtcTs(ts);
  return d ? d.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'}) : '--';
}
function tatStr(ts) {
  var d = parseUtcTs(ts);
  if (!d) return '';
  var m = (Date.now() - d) / 60000;
  if (m < 0) return '';
  if (m < 60) return Math.round(m) + 'm open';
  return (m/60).toFixed(1) + 'hr open';
}

function renderTickets() {
  const el = document.getElementById('tickets-list');
  if (!_tickets.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No active tickets assigned to you</div></div>';
    return;
  }
  el.innerHTML = _tickets.map(t => {
    const isNew = t.status === 'NEW';
    const tat = tatStr(t.created_at_ist);
    const actions = _actions[t.ticket_number] || [];
    const lastAction = actions[actions.length - 1];
    return `<div class="ticket-card ${isNew ? 'urgent' : 'inprog'}" onclick="openDetail('${t.ticket_number}')">
      <div class="tc-top">
        <div class="tc-number">${t.ticket_number}</div>
        <span class="badge ${isNew ? 'badge-new' : 'badge-prog'}">${isNew ? 'NEW' : 'IN PROGRESS'}</span>
      </div>
      <div class="tc-reg">${t.reg_number || '--'}</div>
      <div class="tc-cat">${t.category || '--'}${t.fault_details && t.fault_details !== '--' ? ' · ' + t.fault_details : ''}</div>
      <div class="tc-meta">
        ${tat ? `<span class="tc-time">⏱ ${tat}</span>` : ''}
        ${t.city ? `<span class="tc-city">${t.city}</span>` : ''}
        ${lastAction ? `<span style="font-size:11px;color:var(--teal)">✓ ${actionLabel(lastAction.action)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderHistory(items) {
  const el = document.getElementById('history-list');
  if (!items.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No completed jobs yet</div></div>';
    return;
  }
  el.innerHTML = items.map(a => `
    <div class="history-card">
      <div class="hc-top"><span class="hc-ticket">${a.ticket_number}</span><span class="hc-date">${fmtDateTime(a.created_at)}</span></div>
      <div class="hc-res">✓ ${resLabel(a.resolution_type)}</div>
      ${a.notes ? `<div style="font-size:12px;color:var(--muted);margin-top:4px">${a.notes}</div>` : ''}
    </div>
  `).join('');
}

function actionLabel(a) {
  return {on_my_way:'On My Way',on_site:'On Site',completed:'Completed',note:'Note'}[a] || a;
}
function resLabel(r) {
  return {phone_resolved:'Resolved over phone',repaired_on_site:'Repaired on site',porter_needed:'Porter arranged',towed_to_hub:'Towed to hub',battery_swap:'Battery swap',other:'Other'}[r] || r || '--';
}

// ===== DETAIL MODAL =====
function openDetail(ticketNumber) {
  const t = _tickets.find(x => x.ticket_number === ticketNumber);
  if (!t) return;
  _currentTicket = t;

  document.getElementById('dm-number').textContent = t.ticket_number;
  document.getElementById('dm-title').textContent = t.reg_number || '--';
  document.getElementById('dm-badge-row').innerHTML =
    `<span class="badge ${t.status === 'NEW' ? 'badge-new' : 'badge-prog'}">${t.status === 'NEW' ? 'NEW' : 'IN PROGRESS'}</span>`+
    `${t.city ? `<span class="pill">${t.city}</span>` : ''}`;

  document.getElementById('dm-details').innerHTML = `
    <div class="detail-row"><span class="detail-label">Reg Number</span><span class="detail-value">${t.reg_number || '--'}</span></div>
    <div class="detail-row"><span class="detail-label">Category</span><span class="detail-value">${t.category || '--'}</span></div>
    <div class="detail-row"><span class="detail-label">Fault</span><span class="detail-value">${t.fault_details || '--'}</span></div>
    <div class="detail-row"><span class="detail-label">Created</span><span class="detail-value">${fmtTime(t.created_at_ist)}</span></div>
    ${t.inprogress_at_ist ? `<div class="detail-row"><span class="detail-label">In Progress</span><span class="detail-value">${fmtTime(t.inprogress_at_ist)}</span></div>` : ''}
  `;

  const lat = t.display_lat || t.lat;
  const lng = t.display_lng || t.lng;
  const mapsBtn = document.getElementById('dm-maps-btn');
  if (lat && lng) {
    mapsBtn.href = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
    mapsBtn.style.display = 'flex';
  } else {
    mapsBtn.style.display = 'none';
  }

  renderDetailActions(t);
  renderTimeline(t.ticket_number);

  document.getElementById('detail-modal').style.display = 'flex';
}

function renderDetailActions(t) {
  const actions = _actions[t.ticket_number] || [];
  const done = actions.some(a => a.action === 'completed');
  const onWay = actions.some(a => a.action === 'on_my_way');
  const onSite = actions.some(a => a.action === 'on_site');

  if (done) {
    document.getElementById('dm-actions').innerHTML = '<div class="empty-state" style="padding:16px"><div style="font-size:13px;color:var(--green);font-weight:700">✓ This ticket has been completed</div></div>';
    return;
  }

  let html = '<div class="action-grid">';
  if (!onWay) {
    html += `<button class="btn btn-teal" onclick="logAction('on_my_way')"><span class="btn-icon">🏍</span>On My Way</button>`;
  }
  if (!onSite) {
    html += `<button class="btn btn-amber" onclick="logAction('on_site')"><span class="btn-icon">📍</span>On Site</button>`;
  }
  html += `<button class="btn btn-ghost" onclick="logAction('note')"><span class="btn-icon">📝</span>Add Note</button>`;
  html += `<button class="btn btn-green" onclick="openComplete()"><span class="btn-icon">✅</span>Complete</button>`;
  html += '</div>';
  document.getElementById('dm-actions').innerHTML = html;
}

function renderTimeline(ticketNumber) {
  const actions = _actions[ticketNumber] || [];
  if (!actions.length) {
    document.getElementById('dm-timeline').innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 0">No actions logged yet</div>';
    return;
  }
  document.getElementById('dm-timeline').innerHTML = actions.map((a, i) => `
    <div class="tl-item">
      <div style="display:flex;flex-direction:column;align-items:center;gap:0">
        <div class="tl-dot ${a.action === 'completed' ? 'done' : ''}"></div>
        ${i < actions.length - 1 ? '<div class="tl-line" style="flex:1;min-height:20px"></div>' : ''}
      </div>
      <div class="tl-content">
        <div class="tl-action">${actionLabel(a.action)}</div>
        <div class="tl-time">${fmtDateTime(a.created_at)}</div>
        ${a.notes ? `<div class="tl-note">${a.notes}</div>` : ''}
        ${a.resolution_type ? `<div style="font-size:11px;color:var(--green);margin-top:2px">✓ ${resLabel(a.resolution_type)}</div>` : ''}
        ${a.evidence_urls && a.evidence_urls.length ? `<div style="font-size:11px;color:var(--teal);margin-top:3px">📎 ${a.evidence_urls.length} file(s)</div>` : ''}
      </div>
    </div>
  `).join('');
}

async function logAction(action) {
  if (!_currentTicket) return;
  const notes = action === 'note' ? prompt('Add a note:') : null;
  if (action === 'note' && !notes) return;

  const { error } = await sb.from('rsa_tech_actions').insert({
    ticket_number: _currentTicket.ticket_number,
    technician_id: _tech.id,
    technician_name: _tech.name,
    technician_email: _tech.email,
    action,
    notes: notes || null
  });

  if (error) { showToast('Failed: ' + error.message, 'error'); return; }
  showToast(actionLabel(action) + ' logged', 'success');
  await loadActions([_currentTicket.ticket_number]);
  renderDetailActions(_currentTicket);
  renderTimeline(_currentTicket.ticket_number);
}

function closeDetail() { document.getElementById('detail-modal').style.display = 'none'; _currentTicket = null; }
function closeDetailIfBg(e) { if (e.target.id === 'detail-modal') closeDetail(); }

// ===== COMPLETE FORM =====
function openComplete() {
  _pendingEvidence = [];
  document.getElementById('complete-resolution').value = '';
  document.getElementById('complete-notes').value = '';
  document.getElementById('evidence-input').value = '';
  document.getElementById('evidence-grid').innerHTML = '';
  document.getElementById('upload-progress').style.display = 'none';
  document.getElementById('complete-ticket-info').textContent = _currentTicket ? `${_currentTicket.ticket_number} · ${_currentTicket.reg_number}` : '';
  document.getElementById('detail-modal').style.display = 'none';
  document.getElementById('complete-modal').style.display = 'flex';
}
function closeComplete() {
  document.getElementById('complete-modal').style.display = 'none';
  if (_currentTicket) document.getElementById('detail-modal').style.display = 'flex';
}

async function handleEvidenceFiles(files) {
  for (const file of Array.from(files)) {
    const localUrl = URL.createObjectURL(file);
    const isVideo = file.type.startsWith('video/');
    _pendingEvidence.push({ file, localUrl, isVideo, uploaded_url: null });
    const grid = document.getElementById('evidence-grid');
    const el = document.createElement('div');
    if (isVideo) {
      el.className = 'evidence-thumb video-thumb';
      el.textContent = '🎬';
    } else {
      el.style.cssText = 'width:100%;aspect-ratio:1;border-radius:8px;background:var(--border);background-size:cover;background-position:center;background-image:url(' + localUrl + ')';
    }
    grid.appendChild(el);
  }
}

async function submitComplete() {
  const resolution = document.getElementById('complete-resolution').value;
  const notes = document.getElementById('complete-notes').value.trim();
  if (!resolution) { showToast('Select a resolution type', 'error'); return; }
  if (!_currentTicket) return;

  const btn = document.getElementById('submit-complete-btn');
  btn.disabled = true; btn.textContent = 'Uploading...';

  // Upload evidence
  const uploadedUrls = [];
  if (_pendingEvidence.length) {
    document.getElementById('upload-progress').style.display = 'block';
    for (let i = 0; i < _pendingEvidence.length; i++) {
      const { file } = _pendingEvidence[i];
      const ext = file.name.split('.').pop();
      const path = `${_currentTicket.ticket_number}/${Date.now()}-${i}.${ext}`;
      const { data: uploadData, error: uploadErr } = await sb.storage.from('rsa-evidence').upload(path, file, { upsert: true });
      if (!uploadErr) {
        const { data: { publicUrl } } = sb.storage.from('rsa-evidence').getPublicUrl(path);
        uploadedUrls.push(publicUrl);
      }
      const pct = Math.round(((i+1) / _pendingEvidence.length) * 100);
      document.getElementById('upload-bar').style.width = pct + '%';
    }
  }

  btn.textContent = 'Saving...';

  // Insert action
  const { error } = await sb.from('rsa_tech_actions').insert({
    ticket_number: _currentTicket.ticket_number,
    technician_id: _tech.id,
    technician_name: _tech.name,
    technician_email: _tech.email,
    action: 'completed',
    resolution_type: resolution,
    notes: notes || null,
    evidence_urls: uploadedUrls
  });

  if (error) { showToast('Failed: ' + error.message, 'error'); btn.disabled = false; btn.textContent = '✓ Mark as Complete'; return; }

  // Write back to rsa_tickets_cache
  await sb.from('rsa_tickets_cache').update({ status: 'DONE' }).eq('ticket_number', _currentTicket.ticket_number);

  showToast('Ticket completed! ✓', 'success');
  document.getElementById('complete-modal').style.display = 'none';
  _currentTicket = null;
  await loadTickets();
  await loadHistory();
  await updateStats();
}

// ===== TABS =====
function switchTab(tab) {
  _activeTab = tab;
  document.getElementById('tab-jobs').style.display = tab === 'jobs' ? 'block' : 'none';
  document.getElementById('tab-history').style.display = tab === 'history' ? 'block' : 'none';
  document.getElementById('tab-btn-jobs').className = 'tab' + (tab === 'jobs' ? ' active' : '');
  document.getElementById('tab-btn-history').className = 'tab' + (tab === 'history' ? ' active' : '');
  if (tab === 'history') loadHistory();
}

// ===== TOAST =====
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || '');
  setTimeout(() => { el.className = type || ''; }, 2800);
}

// ===== PWA =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('tech-sw.js').catch(() => {});
}

// ===== PWA INSTALL =====
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  document.getElementById('install-btn').style.display = 'block';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-btn').style.display = 'none';
  _installPrompt = null;
});
async function installApp() {
  if (!_installPrompt) return;
  _installPrompt.prompt();
  const { outcome } = await _installPrompt.userChoice;
  if (outcome === 'accepted') _installPrompt = null;
}

// ===== INIT =====
init();
</script>

</html>
